<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玉见东方 - 玉石文化展示平台</title>
    <!-- 引入外部CSS文件 -->
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <!-- 头部导航 -->
    <div class="header">
        <div class="logo">玉见东方</div>
        <div class="nav">
            <a href="#" onclick="showPage('index')">首页</a>
            <a href="#" onclick="showPage('category')">玉石分类</a>
            <a href="#" onclick="showPage('user')">个人中心</a>
        </div>
    </div>

    <!-- 轮播图 -->
    <div class="banner">
            <div class="banner-slides">
                <div class="slide" style="background-image: url('./img/1.jpg')">
                    传承东方玉文化 · 品鉴千年玉之美
                </div>
                <div class="slide" style="background-image: url('./img/2.jpg')">
                    四大名玉 · 和田玉韵
                </div>
                <div class="slide" style="background-image: url('./img/3.png')">
                     翡翠天成 · 温润如玉
                </div>
            </div>
            <button class="banner-prev" onclick="prevSlide()">&#10094;</button>
            <button class="banner-next" onclick="nextSlide()">&#10095;</button>
            <div class="banner-dots">
                <span class="dot active" onclick="currentSlide(0)"></span>
                <span class="dot" onclick="currentSlide(1)"></span>
                <span class="dot" onclick="currentSlide(2)"></span>
            </div>
        </div>

    <!-- 分类展示区 -->
    <div class="category" id="index-page">
        <h2 class="title">玉石品类展示</h2>
        <div class="category-list">
            <!-- 和田玉 -->
            <div class="category-item" onclick="showDetail('hetian')">
                <img src="./img/4.jpeg" alt="和田玉">
                <div class="info">
                    <h3>和田玉</h3>
                    <p>中国四大名玉之一，质地温润细腻，色泽柔和，素有"君子比德于玉"之说。</p>
                </div>
            </div>
            <!-- 翡翠 -->
            <div class="category-item" onclick="showDetail('feicui')">
                <img src="./img/5.jpeg" alt="翡翠">
                <div class="info">
                    <h3>翡翠</h3>
                    <p>又称缅甸玉，色彩丰富，质地通透，以绿为贵，是玉石中的珍品。</p>
                </div>
            </div>
            <!-- 独山玉 -->
            <div class="category-item" onclick="showDetail('dushan')">
                <img src="./img/6.jpg" alt="独山玉">
                <div class="info">
                    <h3>独山玉</h3>
                    <p>中国四大名玉之一，产于河南南阳独山，色彩斑斓，质地坚韧。</p>
                </div>
            </div>
            <!-- 岫玉 -->
            <div class="category-item" onclick="showDetail('xiu')">
                <img src="./img/7.jpg" alt="岫玉">
                <div class="info">
                    <h3>岫玉</h3>
                    <p>中国四大名玉之一，产于辽宁岫岩，质地细腻，色泽丰富，产量较大。</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 详情页 -->
    <div class="detail" id="detail-page">
        <div class="detail-content">
            <div class="detail-img" id="detail-img">
                <img id="detail-img-tag" src="" alt="玉石详情">
            </div>
            <div class="detail-text">
                <h2 id="detail-title"></h2>
                <div class="desc" id="detail-desc"></div>
                <button class="btn" onclick="addCollect()">加入收藏</button>
                <button class="btn" onclick="addOrder()">模拟下单</button>
                <button class="btn" onclick="showPage('index')">返回首页</button>
            </div>
        </div>
    </div>

    <!-- 个人中心 -->
    <div class="user-center" id="user-page">
        <h2 class="title">个人中心</h2>
        <h3>我的收藏</h3>
        <div class="collect-list" id="collect-list">
            <div class="collect-item">暂无收藏，请先添加</div>
        </div>
        <h3 style="margin-top: 30px;">我的订单</h3>
        <div class="order-list" id="order-list">
            <div class="order-item">暂无订单，请先下单</div>
        </div>
    </div>

    <!-- 底部 -->
    <div class="footer">
        玉见东方 © 2026 玉石文化展示平台
    </div>

    <!-- 引入外部JS文件（放在body末尾，确保DOM加载完成） -->
    <script src="./js/main.js"></script>
</body>
</html>
